# Mantém a API acordada no plano free do Render (que hiberna após 15 min).
# Necessário para os crons (18h sem-receita, vencimentos, recorrentes) dispararem.
# Configure a variável API_URL no repo: Settings → Secrets and variables → Actions → Variables.
name: Keepalive

on:
  schedule:
    - cron: '*/10 * * * *' # a cada 10 minutos
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          if [ -n "${{ vars.API_URL }}" ]; then
            curl -fsS "${{ vars.API_URL }}/health" || echo "API não respondeu"
          else
            echo "Defina a variável API_URL nas configurações do repositório."
          fi

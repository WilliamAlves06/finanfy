# Blueprint do Render (free) — deploy da API Finanfy.
# No painel do Render: New → Blueprint → escolha este repositório.
# Docs: docs/15-deploy.md
services:
  - type: web
    name: finanfy-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: ohio # us-east-2, mesma região do Supabase
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TZ
        value: America/Sao_Paulo
      - key: JWT_SECRET
        generateValue: true # o Render gera um segredo forte automaticamente
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL_DAYS
        value: '30'
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      # ↓ preencha estes no painel (Environment) — valores do seu .env local
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: WEB_ORIGIN
        sync: false # URL do web na Vercel (ex.: https://finanfy.vercel.app)
